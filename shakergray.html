<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shaker Gray Gallery</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <style>
    .shakergray-hero {
      background: linear-gradient(135deg, #d9d9d9 0%, #bfbfbf 60%);
      padding: 100px 1rem;
      text-align: center;
    }

    .shakergray-hero h1 {
      font-size: 2.6rem;
      margin-bottom: .6rem;
    }

    .shakergray-hero p {
      opacity: .9;
      margin-bottom: 1.4rem;
    }
  </style>
</head>

<body class="shakergray-page">
  <header class="navbar">
    <div class="nav-container">
      <div class="logo"><a class="logo-link" href="index.html"><a href="index.html" class="logo-link">
            <img src="images/logo.png" alt="Cabinets4Less logo" class="nav-logo-image">
            <span>Cabinets4Less</span>
          </a></div>
      <nav>
        <ul class="nav-menu">
          <li><a class="nav-link" href="index.html">Home</a></li>
          <li><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="shakergray-hero">
    <div class="hero-content">
      <h1>Shaker Gray</h1>
    </div>
  </section>

  <main class="gallery">
    <h2>Designs in Shaker Gray</h2>
    <div class="gallery-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));">
      <div class="gallery-item">
        <div class="gallery-placeholder">
          <img class="gallery-image" src="images/Shaker Gray.png" alt="Shaker Gray Cabinet sample">
        </div>
        <a href="#">Shaker Gray Sample (local)</a>
      </div>
      <div class="gallery-item">
        <div class="gallery-placeholder">
          <img class="gallery-image"
            src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='500'><rect width='100%' height='100%' fill='%23bfbfbf'/><circle cx='400' cy='250' r='150' fill='%23a6a6a6' opacity='0.6'/></svg>"
            alt="Shaker Gray gradient SVG">
        </div>
        <a href="#">Shaker Gray Gradient SVG</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p>&copy; 2026 Cabinets4Less. All rights reserved.</p>
      <p>Crafting Quality Cabinets for Your Home</p>
    </div>
  </footer>
</body>

</html>

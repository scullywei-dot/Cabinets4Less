<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shaker White Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/icon.png">
    <style>
        /* Page-specific tweaks to emphasize shaker white */
        .shakerwhite-hero {
            background: linear-gradient(135deg, #f7f7f7 0%, #eaeaea 60%);
            color: var(--text-dark);
            padding: 100px 1rem;
            text-align: center;
        }

        .shakerwhite-hero h1 {
            font-size: 2.6rem;
            margin-bottom: .6rem;
            text-align: center;
        }

        .shakerwhite-hero p {
            opacity: .9;
            margin-bottom: 1.4rem;
        }
    </style>
</head>

<body class="shakerwhite-page">

    <header class="navbar">
        <div class="nav-container">
            <div class="logo"><a class="logo-link" href="index.html"><a href="index.html" class="logo-link">
                        <img src="images/logo.png" alt="Cabinets4Less logo" class="nav-logo-image">
                        <span>Cabinets4Less</span>
                    </a></a></div>
            <nav>
                <ul class="nav-menu">
                    <li><a class="nav-link" href="index.html">Home</a></li>
                    <li><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="shakerwhite-hero">
        <div class="hero-content">
            <h1>Shaker White</h1>
        </div>
    </section>

    <main class="gallery">
        <h2>Designs in Shaker White</h2>
        <div class="gallery-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));">

            <div class="gallery-item">
                <div class="gallery-placeholder">
                    <img class="gallery-image" src="images/Shaker White.png" alt="Shaker White Cabinet sample">
                </div>
                <a href="#">Shaker White Sample (local)</a>
            </div>

            <div class="gallery-item">
                <div class="gallery-placeholder">
                    <img class="gallery-image"
                        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='500'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop offset='0%' stop-color='%23f5f5f5'/><stop offset='100%' stop-color='%23e0e0e0'/></linearGradient></defs><rect width='100%' height='100%' fill='url(%23g)'/><circle cx='120' cy='120' r='80' fill='%23ffffff' opacity='0.6'/><circle cx='680' cy='380' r='140' fill='%23dcdcdc' opacity='0.35'/></svg>"
                        alt="Shaker White gradient SVG">
                </div>
                <a href="#">Shaker White Gradient SVG</a>
            </div>

            <div class="gallery-item">
                <div class="gallery-placeholder">
                    <img class="gallery-image"
                        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='500'><rect width='100%' height='100%' fill='%23f2f2f2'/><g fill='%23e8e8e8' opacity='0.85'><rect x='0' y='80' width='800' height='40'/><rect x='0' y='160' width='800' height='40'/><rect x='0' y='240' width='800' height='40'/></g></svg>"
                        alt="Shaker White stripes">
                </div>
                <a href="#">Shaker White Stripes SVG</a>
            </div>

            <div class="gallery-item">
                <div class="gallery-placeholder">
                    <img class="gallery-image"
                        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='500'><defs><linearGradient id='w' x1='0' x2='0' y1='0' y2='1'><stop offset='0' stop-color='%23fafafa'/><stop offset='1' stop-color='%23eaeaea'/></linearGradient></defs><rect width='100%' height='100%' fill='url(%23w)'/><path d='M0 300 Q200 220 400 300 T800 300 L800 500 L0 500 Z' fill='%23f0f0f0' opacity='0.6'/></svg>"
                        alt="Shaker White waves">
                </div>
                <a href="#">Shaker White Waves SVG</a>
            </div>

        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Cabinets4Less. All rights reserved.</p>
            <p>Crafting Quality Cabinets for Your Home</p>
        </div>
    </footer>

</body>

</html>

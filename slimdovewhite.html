<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slim Dove White Gallery</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .slimdovewhite-hero {
      background: linear-gradient(135deg, #f9f9f9 0%, #eaeaea 60%);
      padding: 100px 1rem;
      text-align: center;
      color: var(--text-dark);
    }
    .slimdovewhite-hero h1 {
      font-size: 2.6rem;
      margin-bottom: .6rem;
    }
    .slimdovewhite-hero p { opacity: .9; margin-bottom: 1.4rem; }
  </style>
</head>
<body class="slimdovewhite-page">
  <header class="navbar">
    <div class="nav-container">
      <div class="logo"><a class="logo-link" href="index.html">Cabinets4Less</a></div>
      <nav>
        <ul class="nav-menu">
          <li><a class="nav-link" href="index.html">Home</a></li>
          <li><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="slimdovewhite-hero">
    <div class="hero-content">
      <h1>Slim Dove White</h1>
    </div>
  </section>

  <main class="gallery">
    <h2>Designs in Slim Dove White</h2>
    <div class="gallery-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));">
      <div class="gallery-item">
        <div class="gallery-placeholder">
          <img class="gallery-image" src="images/Slim Dove White.png" alt="Slim Dove White Cabinet sample">
        </div>
        <a href="#">Slim Dove White Sample (local)</a>
      </div>
      <div class="gallery-item">
        <div class="gallery-placeholder">
          <img class="gallery-image" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='500'><rect width='100%' height='100%' fill='%23f2f2f2'/><circle cx='400' cy='250' r='150' fill='%23e0e0e0' opacity='0.6'/></svg>" alt="Slim Dove White gradient SVG">
        </div>
        <a href="#">Slim Dove White Gradient SVG</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p>&copy; 2026 Cabinets4Less. All rights reserved.</p>
      <p>Crafting Quality Cabinets for Your Home</p>
    </div>
  </footer>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slim White Oak Gallery</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .slimwhiteoak-hero {
      background: linear-gradient(135deg, #f5f0e6 0%, #e8dcc4 60%);
      padding: 100px 1rem;
      text-align: center;
      color: var(--text-dark);
    }
    .slimwhiteoak-hero h1 {
      font-size: 2.6rem;
      margin-bottom: .6rem;
    }
    .slimwhiteoak-hero p { opacity: .9; margin-bottom: 1.4rem; }
  </style>
</head>
<body class="slimwhiteoak-page">
  <header class="navbar">
    <div class="nav-container">
      <div class="logo"><a class="logo-link" href="index.html">Cabinets4Less</a></div>
      <nav>
        <ul class="nav-menu">
          <li><a class="nav-link" href="index.html">Home</a></li>
          <li><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="slimwhiteoak-hero">
    <div class="hero-content">
      <h1>Slim White Oak</h1>
    </div>
  </section>

  <main class="gallery">
    <h2>Designs in Slim White Oak</h2>
    <div class="gallery-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));">
      <div class="gallery-item">
        <div class="gallery-placeholder">
          <img class="gallery-image" src="images/Slim White Oak.png" alt="Slim White Oak Cabinet sample">
        </div>
        <a href="#">Slim White Oak Sample (local)</a>
      </div>
      <div class="gallery-item">
        <div class="gallery-placeholder">
          <img class="gallery-image" src="data:image
